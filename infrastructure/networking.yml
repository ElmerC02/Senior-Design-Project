AWSTemplateFormatVersion: '2010-09-09'
Description: Security groups for UMG Express backend

Parameters:
  VpcId:
    Type: String
    Default: vpc-0149212116d92f81e
    Description: Existing VPC ID

  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]

  BackendPort:
    Type: Number
    Default: 4000
    Description: Port the Express backend runs on

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: EC2 instance type for the backend server

  DBPort:
    Type: Number
    Default: 5432
    Description: PostgreSQL database port

  DBName:
    Type: String
    Default: umgdb
    Description: Database name

  DBUsername:
    Type: String
    Default: umgadmin
    Description: Database admin username

Resources:
  BackendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub umg-backend-sg-${Environment}
      GroupDescription: Security group for Express backend
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref BackendPort
          ToPort: !Ref BackendPort
          CidrIp: 0.0.0.0/0
          Description: Allow backend traffic
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: Allow SSH
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub umg-backend-sg-${Environment}
        - Key: Environment
          Value: !Ref Environment

Outputs:
  BackendSecurityGroupId:
    Description: Backend Security Group ID
    Value: !Ref BackendSecurityGroup
    Export:
      Name: !Sub umg-backend-sg-${Environment}

  BackendPort:
    Description: Backend port
    Value: !Ref BackendPort

  InstanceType:
    Description: EC2 instance type
    Value: !Ref InstanceType

  DBPort:
    Description: Database port
    Value: !Ref DBPort

  DBName:
    Description: Database name
    Value: !Ref DBName
