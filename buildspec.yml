version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo Installing dependencies...
      - npm ci

  build:
    commands:
      - echo Building the Express backend...
      - npm run build --workspace=@umg/server

  post_build:
    commands:
      - echo Build complete.

artifacts:
  files:
    - '**/*'
  base-directory: apps/server/dist
